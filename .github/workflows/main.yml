name: Déploiement sur IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances et builder le frontend React
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Vérifier le build React
        run: |
          echo "=== Contenu de public/react/ ==="
          ls -la public/react/
          echo "=== Contenu de public/react/.vite/ ==="
          ls -la public/react/.vite/
          echo "=== Contenu du manifest ==="
          cat public/react/.vite/manifest.json
          echo "=== Assets générés ==="
          ls -la public/react/assets/

      - name: Nettoyer public/react/ sur le serveur avant déploiement
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            cd ${{ secrets.IONOS_PATH }}
            echo "Nettoyage de public/react/ pour éviter les assets obsolètes..."
            rm -rf public/react/assets
            rm -rf public/react/.vite
            echo "Nettoyage terminé."

      - name: Déployer via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          source: "assets/*, bin/*, config/*, migrations/*, public/*, src/*, templates/*, translations/*, importmap.php, ./*.json, ./*.lock"
          target: ${{ secrets.IONOS_PATH }}
          strip_components: 0
          overwrite: true

      - name: Exécuter des commandes sur IONOS (si besoin)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            cd ${{ secrets.IONOS_PATH }}
            
            # Créer .env.local avec APP_ENV=prod s'il n'existe pas
            if [ ! -f .env.local ]; then
              echo "Création de .env.local avec APP_ENV=prod"
              echo "APP_ENV=prod" > .env.local
            elif ! grep -q "APP_ENV=prod" .env.local; then
              echo "Mise à jour de .env.local avec APP_ENV=prod"
              sed -i '/^APP_ENV=/d' .env.local
              echo "APP_ENV=prod" >> .env.local
            fi
            
            # Vérifier que le build React est présent
            echo "=== Vérification du build React déployé ==="
            ls -la public/react/ || echo "ERREUR: Le dossier public/react n'existe pas!"
            ls -la public/react/.vite/ || echo "ERREUR: Le dossier public/react/.vite n'existe pas!"
            
            if [ ! -f public/react/.vite/manifest.json ]; then
              echo "ERREUR CRITIQUE: Le manifest React n'existe pas après déploiement!"
              exit 1
            fi
            
            echo "Manifest React trouvé:"
            cat public/react/.vite/manifest.json
            
            # Installation des dépendances
            /usr/bin/php8.3-cli ~/composer.phar install --no-dev --optimize-autoloader --no-interaction
            
            # Migrations
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            
            # Cache
            php bin/console cache:clear --env=prod --no-warmup
            php bin/console cache:warmup --env=prod
            
            # Permissions
            chmod -R 755 var/cache var/log public/react
            
            # Nettoyage
            rm -f /*.tar.gz
            
            echo "Déploiement terminé avec succès!"
