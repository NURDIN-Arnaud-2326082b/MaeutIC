name: Déploiement sur IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances et builder le frontend React
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Afficher les fichiers avant déploiement
        run: |
          ls -R ./src
          ls -R ./public/react
          cat ./composer.json
      - name: Déployer via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          source: "bin/*, config/*, migrations/*, public/*, src/*, templates/*, ./*.json, ./*.lock"
          target: ${{ secrets.IONOS_PATH }}

      - name: Exécuter des commandes sur IONOS (si besoin)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            cd ${{ secrets.IONOS_PATH }}
            ls
            /usr/bin/php8.3-cli ~/composer.phar update
            /usr/bin/php8.3-cli ~/composer.phar install --no-dev --optimize-autoloader
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod
            php bin/console cache:clear --env=prod
            php bin/console cache:warmup --env=prod
            rm -f /*.tar.gz
      - name: Afficher les fichiers après déploiement
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            cd ${{ secrets.IONOS_PATH }}
            ls -R
